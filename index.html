<!DOCTYPE html>
<html lang="es" data-theme="ocean">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eisenhower Agile - Sistema de Productividad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App Entry Point -->
    <script type="module" src="js/main.js"></script>
</head>

<body class="bg-[var(--color-bg-primary)] text-[var(--color-text-primary)] transition-colors duration-300">
    <!-- CRASH SCREEN -->
    <div id="crash-screen"
        class="fixed inset-0 bg-white dark:bg-slate-900 z-[9999] flex flex-col items-center justify-center p-6 text-center hidden">
        <div class="max-w-md">
            <h1 class="text-2xl font-bold mb-4">Error de Inicialización</h1>
            <p id="crash-message" class="mb-6"></p>
            <button onclick="location.reload()" class="btn-action">Reintentar</button>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-container"
        class="fixed inset-0 bg-slate-50 dark:bg-slate-900 z-[100] flex flex-col items-center justify-center">
        <h1
            class="text-4xl font-extrabold mb-10 text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-violet-600">
            Productividad Ágil</h1>
        <div id="user-select-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-4xl w-full px-4">
        </div>
    </div>

    <!-- MAIN APP APP -->
    <div id="app" class="h-screen w-screen flex flex-col hidden overflow-hidden">
        <header class="bg-[var(--color-card-bg)] shadow-md p-4 flex justify-between items-center z-20">
            <div class="flex items-center space-x-4">
                <h1 id="app-logo" class="text-2xl font-bold text-blue-600 cursor-pointer">Eisenhower</h1>
                <div id="current-user-display"></div>
                <div id="online-users-container" class="flex -space-x-2 ml-4"></div>
            </div>
            <div class="flex items-center space-x-2">
                <button id="activity-log-btn" class="p-2 hover:bg-[var(--color-bg-secondary)] rounded-full">📜</button>
                <div class="relative group">
                    <button id="theme-selector-btn"
                        class="p-2 hover:bg-[var(--color-bg-secondary)] rounded-full">🎨</button>
                </div>
            </div>
        </header>

        <nav class="bg-[var(--color-card-bg)] shadow-sm px-8 flex space-x-8">
            <button data-view="boards"
                class="nav-tab py-3 font-semibold active border-b-2 border-blue-600 text-blue-600">Mis Tableros</button>
            <button data-view="matrices" class="nav-tab py-3 font-semibold">Priorización</button>
            <button data-view="dashboard" class="nav-tab py-3 font-semibold">Estadísticas</button>
        </nav>

        <main id="main-content" class="flex-grow overflow-hidden relative">
            <!-- SECCIÓN: Galería de Tableros -->
            <section id="boards-gallery-view" class="p-8 h-full overflow-y-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold">Mis Tableros</h2>
                    <button id="new-board-btn" class="btn-action">+ Nuevo Tablero</button>
                </div>
                <div id="boards-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </section>

            <!-- SECCIÓN: Galería de Matrices -->
            <section id="matrices-gallery-view" class="p-8 h-full overflow-y-auto hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold">Mis Matrices</h2>
                    <button id="new-matrix-btn" class="btn-action">+ Nueva Matriz</button>
                </div>
                <div id="matrices-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </section>

            <!-- SECCIÓN: Detalle de Tablero (Kanban) -->
            <section id="board-detail-view" class="hidden flex-col h-full overflow-hidden">
                <div
                    class="p-4 border-b border-[var(--color-border)] flex justify-between items-center bg-[var(--color-card-bg)]">
                    <div class="flex items-center gap-3">
                        <button id="back-to-boards-btn" class="p-2 hover:bg-[var(--color-bg-secondary)] rounded-full"
                            title="Volver a la galería">⬅️</button>
                        <h2 id="board-title" class="text-2xl font-bold truncate"></h2>
                    </div>
                    <div class="flex gap-2">
                        <button id="add-column-btn" class="btn-action">+ Columna</button>
                    </div>
                </div>
                <div id="filters-panel"
                    class="px-4 py-2 border-b flex gap-4 text-sm bg-[var(--color-bg-secondary)] items-center">
                    <input type="search" id="task-search-input" placeholder="Buscar..."
                        class="rounded-md border-gray-300 dark:bg-slate-800 py-1 px-3">
                    <select id="label-filter-select" class="rounded-md border-gray-300 dark:bg-slate-800 py-1 px-3">
                        <option value="">Etiquetas</option>
                    </select>
                    <select id="member-filter-select" class="rounded-md border-gray-300 dark:bg-slate-800 py-1 px-3">
                        <option value="">Miembros</option>
                    </select>
                </div>
                <div id="board-columns-container" class="flex-grow flex p-4 gap-4 overflow-x-auto items-start"></div>
            </section>

            <!-- SECCIÓN: Detalle de Matriz (Eisenhower) -->
            <section id="matrix-detail-view" class="hidden flex-col h-full overflow-hidden">
                <div class="p-4 border-b flex justify-between items-center bg-[var(--color-card-bg)]">
                    <div class="flex items-center gap-3">
                        <button id="back-to-matrices-btn"
                            class="p-2 hover:bg-[var(--color-bg-secondary)] rounded-full">⬅️</button>
                        <h2 id="matrix-title" class="text-2xl font-bold"></h2>
                    </div>
                </div>
                <div class="flex-grow p-4 grid grid-cols-1 md:grid-cols-2 gap-4 overflow-hidden">
                    <div id="q-do"
                        class="quadrant bg-red-50 dark:bg-red-950/20 p-3 rounded-lg flex flex-col border border-red-200">
                        <h3 class="font-bold text-red-700 dark:text-red-400 mb-2">Hacer Ahora (Urg/Imp)</h3>
                        <div class="tasks flex-grow overflow-y-auto"></div>
                    </div>
                    <div id="q-plan"
                        class="quadrant bg-blue-50 dark:bg-blue-950/20 p-3 rounded-lg flex flex-col border border-blue-200">
                        <h3 class="font-bold text-blue-700 dark:text-blue-400 mb-2">Planificar (Imp/No Urg)</h3>
                        <div class="tasks flex-grow overflow-y-auto"></div>
                    </div>
                    <div id="q-delegate"
                        class="quadrant bg-orange-50 dark:bg-orange-950/20 p-3 rounded-lg flex flex-col border border-orange-200">
                        <h3 class="font-bold text-orange-700 dark:text-orange-400 mb-2">Delegar (Urg/No Imp)</h3>
                        <div class="tasks flex-grow overflow-y-auto"></div>
                    </div>
                    <div id="q-eliminate"
                        class="quadrant bg-emerald-50 dark:bg-emerald-950/20 p-3 rounded-lg flex flex-col border border-emerald-200">
                        <h3 class="font-bold text-emerald-700 dark:text-emerald-400 mb-2">Eliminar (No Urg/No Imp)</h3>
                        <div class="tasks flex-grow overflow-y-auto"></div>
                    </div>
                </div>
            </section>

            <!-- SECCIÓN: Dashboard (Estadísticas) -->
            <section id="dashboard-view" class="p-8 h-full overflow-y-auto hidden">
                <h2 class="text-3xl font-bold mb-6">Estadísticas de Productividad</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div
                        class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-[var(--color-border)]">
                        <h3 class="text-gray-500 text-sm mb-1 uppercase font-bold tracking-wider">Lead Time Promedio
                        </h3>
                        <div id="avg-lead-time" class="text-4xl font-bold text-blue-600">N/A</div>
                    </div>
                    <!-- Más widgets de dashboard... -->
                </div>
            </section>

        </main>
    </div>

    <!-- MODAL CONTAINER -->
    <div id="modal-container" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden">
        <div id="modal-content"
            class="bg-[var(--color-card-bg)] rounded-2xl shadow-2xl p-6 w-full max-w-lg mx-4 transform transition-all scale-95 opacity-0">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 id="modal-title" class="text-xl font-bold"></h3>
                <button id="modal-close-btn"
                    class="p-2 hover:bg-gray-100 rounded-full transition-transform hover:rotate-90">✕</button>
            </div>
            <div id="modal-body" class="max-h-[70vh] overflow-y-auto"></div>
        </div>
    </div>

    <!-- TEMPLATES -->

    <!-- Plantilla: Tarjeta de Tablero -->
    <template id="board-card-template">
        <div
            class="gallery-card bg-[var(--color-card-bg)] rounded-xl shadow-md p-5 border-l-4 border-blue-500 hover:shadow-xl transition-all cursor-pointer group">
            <h3 class="board-name font-bold text-lg mb-4 text-gray-800 dark:text-white"></h3>
            <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <button
                    class="delete-board-btn p-2 hover:bg-red-50 text-red-400 hover:text-red-500 rounded-full transition-colors">🗑️</button>
            </div>
        </div>
    </template>

    <!-- Plantilla: Tarjeta de Matriz -->
    <template id="matrix-card-template">
        <div
            class="gallery-card bg-[var(--color-card-bg)] rounded-xl shadow-md p-5 border-l-4 border-purple-500 hover:shadow-xl transition-all cursor-pointer group">
            <h3 class="matrix-name font-bold text-lg mb-4 text-gray-800 dark:text-white"></h3>
            <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <button
                    class="delete-matrix-btn p-2 hover:bg-red-50 text-red-400 hover:text-red-500 rounded-full transition-colors">🗑️</button>
            </div>
        </div>
    </template>

    <!-- Plantilla: Columna Kanban -->
    <template id="column-template">
        <div class="column bg-[var(--color-bg-secondary)] rounded-xl w-72 flex flex-col flex-shrink-0"
            style="max-height: 100%;">
            <div class="p-4 border-b flex justify-between items-center font-bold">
                <span class="column-title truncate"></span>
                <span class="task-count bg-slate-300 dark:bg-slate-700 text-xs px-2 py-0.5 rounded-full">0</span>
            </div>
            <div class="tasks-container p-3 flex-grow overflow-y-auto"></div>
            <button
                class="add-task-btn p-3 text-sm text-center font-medium hover:bg-white/50 text-blue-600 border-t transition-colors">
                + Añadir Tarea
            </button>
        </div>
    </template>

    <!-- Plantilla: Tarjeta de Tarea -->
    <template id="task-card-template">
        <div
            class="task-card group bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-gray-200 dark:border-slate-700 p-4 mb-3 transition-all hover:border-blue-400 hover:shadow-md relative pl-7 overflow-hidden">
            <div
                class="drag-handle absolute left-0 top-0 bottom-0 w-6 flex items-center justify-center cursor-grab opacity-20 group-hover:opacity-100 hover:bg-blue-50 transition-all">
                ⋮⋮</div>
            <div class="flex justify-between items-start mb-2">
                <h4 class="task-title font-medium text-gray-800 dark:text-gray-200 leading-snug"></h4>
                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button class="delete-task-btn p-1 text-red-400 hover:bg-red-50 rounded">🗑️</button>
                </div>
            </div>
            <div class="task-labels-container flex flex-wrap gap-1 mt-2"></div>
            <div class="flex justify-between items-center mt-3">
                <div class="task-due-date hidden text-[10px] bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-bold">
                </div>
                <div class="task-assignee-avatar hidden"></div>
            </div>
        </div>
    </template>

    <div id="assist-toast"
        class="fixed bottom-6 right-6 px-6 py-3 bg-slate-800 text-white rounded-xl shadow-2xl z-[9999] transition-all transform translate-y-20 opacity-0 pointer-events-none">
    </div>

</body>

</html>
